# PR to PO Agent — reproducible Conda environment
# Create: conda env create -f environment.yml
# Activate: conda activate pr2po
# Update env from this file: conda env update -f environment.yml --prune
#
# Python 3.10 is pinned so all systems get the same interpreter. Pip dependencies
# match requirements.txt; for exact pip pins, regenerate with:
#   conda activate pr2po && pip freeze > requirements-frozen.txt

name: pr2po
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
    - jupyter>=1.0.0
    - notebook>=7.0.0
    - ipykernel>=6.0.0
    - pydantic>=2.9.2
    - pydantic-settings>=2.1.0
    - python-dotenv==1.2.1
    - httpx>=0.25.0
    - langchain==1.1.2
    - langchain-text-splitters
    - langchain-community==0.4.1
    - langchain-groq>=0.1.0
    - langchain-google-genai>=2.0.0
    - boto3==1.42.4
    - langchain-aws==1.1.0
    - botocore>=1.34.0
    - pypdf==6.4.0
    - python-docx==1.2.0
    - openpyxl==3.1.5
    - sqlalchemy>=2.0.25
    - jsonschema>=4.0.0
    - psycopg2-binary==2.9.11
    - orjson>=3.9.0
    - numpy>=1.24.0
    - langgraph>=0.2.0
    - grandalf>=0.1
    - pgvector>=0.3.0
    - qdrant-client>=1.7.0
    - opensearch-py>=2.4.0
    - sentence-transformers>=2.2.0
